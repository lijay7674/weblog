server:
  port: 8082

spring:
  application:
    name: forum-post
  cloud:
    nacos:
      server-addr: localhost:8848
      discovery:
        namespace: forum-dev
      config:
        namespace: forum-dev
        file-extension: yaml
  config:
    import: nacos:forum-post.yaml
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/forum_post?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: root
  data:
    redis:
      host: localhost
      port: 6379
      database: 2
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: auto
        prefetch: 10

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.forum.post.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

logging:
  level:
    com.forum.post: debug
