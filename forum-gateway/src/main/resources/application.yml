# 本地配置 - 用于连接Nacos配置中心
# 业务配置已迁移至Nacos，请查看 application-nacos.yml

server:
  port: 8080

spring:
  application:
    name: forum-gateway
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
        namespace: forum-dev
      config:
        server-addr: localhost:8848
        namespace: forum-dev
        file-extension: yaml
